# Next.js is served by the Netlify Next runtime, not as a plain static folder.
# If the Netlify UI has a "Publish directory" set to this app folder, remove it
# or leave it blank so this config + the plugin control the output.

[build]
  command = "npm run build"
  # Must differ from the site "base" (e.g. apps/web); defaulting publish to the
  # base dir makes @netlify/plugin-nextjs fail with "publish cannot be the same as base"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
