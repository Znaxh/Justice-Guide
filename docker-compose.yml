services:
  api:
    build: .
    ports:
      - "8000:8000"
      - "${PHOENIX_PORT:-6006}:${PHOENIX_PORT:-6006}"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    environment:
      PHOENIX_PORT: ${PHOENIX_PORT:-6006}
      UV_PRERELEASE: allow

  web:
    build: ./apps/web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - api
